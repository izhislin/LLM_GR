  - ["\\bсофт.?фон", "софтфон"]
  - ["\\bСофт.?фон", "Софтфон"]

staff: []

llm_context: |
  Звонок в/из компании «Гравител» — оператор облачной телефонии и ВАТС.
  Продукты: Грави-фон (софтфон), личный кабинет, виртуальная АТС.
  У каждого клиента свой домен для входа в личный кабинет и приложение.
  Термины: добавочный номер, домен, переадресация, SIP-транк, IVR-меню.
