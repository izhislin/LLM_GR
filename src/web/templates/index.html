{% extends "base.html" %}
{% block title %}Звонки{% endblock %}
{% block content %}
<div class="filters">
    <select id="filter-domain"><option value="">Все домены</option></select>
    <select id="filter-direction">
        <option value="">Все направления</option>
        <option value="in">Входящие</option>
        <option value="out">Исходящие</option>
    </select>
    <select id="filter-status">
        <option value="">Все статусы</option>
        <option value="pending">Ожидает</option>
        <option value="processing">Обработка</option>
        <option value="done">Готово</option>
        <option value="error">Ошибка</option>
        <option value="skipped">Пропущен</option>
    </select>
    <input type="date" id="filter-date-from" placeholder="С даты">
    <input type="date" id="filter-date-to" placeholder="По дату">
    <button id="btn-sync" class="btn btn-sync">Sync</button>
</div>

<table id="calls-table">
    <thead>
        <tr>
            <th>Время</th>
            <th>Направление</th>
            <th>Клиент</th>
            <th>Оператор</th>
            <th>Длительность</th>
            <th>Оценка</th>
            <th>Статус</th>
        </tr>
    </thead>
    <tbody id="calls-body">
        <tr><td colspan="7" class="loading">Загрузка...</td></tr>
    </tbody>
</table>

<div class="pagination" id="pagination"></div>
{% endblock %}
