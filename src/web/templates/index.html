{% extends "base.html" %}
{% block title %}Звонки{% endblock %}
{% block content %}
<div class="filters">
    <select id="filter-domain"><option value="">Все домены</option></select>
    <select id="filter-direction">
        <option value="">Все направления</option>
        <option value="in">Входящие</option>
        <option value="out">Исходящие</option>
        <option value="missed">Пропущенные</option>
    </select>
    <select id="filter-status">
        <option value="">Все статусы</option>
        <option value="pending">Ожидает</option>
        <option value="processing">Обработка</option>
        <option value="done">Готово</option>
        <option value="error">Ошибка</option>
        <option value="skipped">Пропущен</option>
    </select>
    <select id="filter-operator"><option value="">Все операторы</option></select>
    <input type="text" id="filter-client" placeholder="Номер клиента">
    <div class="filter-group">
        <label class="filter-label">Оценка:</label>
        <input type="number" id="filter-score-min" placeholder="от" min="0" max="10" step="1" class="filter-score-input">
        <span>–</span>
        <input type="number" id="filter-score-max" placeholder="до" min="0" max="10" step="1" class="filter-score-input">
    </div>
</div>
<div class="filters filters-row-2">
    <input type="date" id="filter-date-from">
    <input type="date" id="filter-date-to">
    <div class="date-presets">
        <button class="btn btn-preset" data-preset="today">Сегодня</button>
        <button class="btn btn-preset" data-preset="yesterday">Вчера</button>
        <button class="btn btn-preset" data-preset="week">Неделя</button>
    </div>
    <button id="btn-sync" class="btn btn-sync">Sync</button>
</div>

<table id="calls-table">
    <thead>
        <tr>
            <th class="sortable" data-sort="started_at">Время <span class="sort-icon">▼</span></th>
            <th>Направление</th>
            <th>Клиент</th>
            <th>Оператор</th>
            <th class="sortable" data-sort="duration">Длительность</th>
            <th class="sortable" data-sort="score">Оценка</th>
            <th>Тема</th>
            <th>Статус</th>
        </tr>
    </thead>
    <tbody id="calls-body">
        <tr><td colspan="8" class="loading">Загрузка...</td></tr>
    </tbody>
</table>

<div class="pagination" id="pagination"></div>
{% endblock %}
