services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8091:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - ENABLE_SIGNUP=false
      - WEBUI_NAME=Gravitel AI
    volumes:
      - open-webui-data:/app/backend/data
      - ./config/open-webui-custom.css:/app/backend/open_webui/static/custom.css:ro
      - ./config/open-webui-assets/favicon.svg:/app/backend/open_webui/static/favicon.svg:ro
      - ./config/open-webui-assets/favicon.svg:/app/build/static/favicon.svg:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  open-webui-data:
